name: Fashionket CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9  # Matches your local environment

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Optional: Add a Lint step if you use ESLint
      # - name: Lint
      #   run: pnpm run lint

      - name: Build TanStack Start App
        run: pnpm run build
        env:
          # If your build requires environment variables (like API URLs), 
          # add them here or via GitHub Secrets
          NODE_ENV: production

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nitro-output
          path: .output
          retention-days: 7